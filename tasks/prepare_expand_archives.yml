---
- name: "Check if destination directories are present" # noqa: name[template]
  ansible.builtin.stat:
    path: "{{ item.base_destination_directory }}"
  register: destination_directory
  loop: "{{ archive_definitions }}"

- name: "Check if destination directories are empty"
  ansible.builtin.find:
    paths: "{{ item.stat.path }}"
    file_type: any
  register: destination_directory_files
  when: item.stat.exists and not item.stat.isdir
  loop: "{{ destination_directory.results }}"
  loop_control:
    loop_var: item

- name: "Ensure destination directory is present" # noqa: name[template]
  ansible.builtin.file:
    path: "{{ archive.base_destination_directory }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: "0755"
  loop: "{{ archive_definitions }}"
  loop_control:
    loop_var: archive

- name: "Check if SHA256 files are present"
  ansible.builtin.stat:
    path: "{{ artifactory_status_directory }}/{{ archive.filename }}.sha256"
  register: sha256_files
  loop: "{{ archive_definitions }}"
  loop_control:
    loop_var: archive

- name: "Read SHA256 content from files if present"
  ansible.builtin.slurp:
    src: "{{ artifactory_status_directory }}/{{ item.filename }}.sha256"
  register: sha256_content
  when: item.stat.exists
  loop: "{{ sha256_files.results }}"
  loop_control:
    loop_var: item

- name: "Perform a HEAD on the remote file to read sha256" # noqa: name[template]
  ansible.builtin.uri:
    url: "{{ artifactory_base_url }}/{{ archive.artifactory_path }}/{{ archive.filename }}"
    method: HEAD
    timeout: 60
    url_username: "{{ ansible_deployment_artifactory_user }}"
    url_password: "{{ ansible_deployment_artifactory_key }}"
  register: remote_archive_head
  loop: "{{ archive_definitions }}"
  loop_control:
    loop_var: archive

- name: "Check downloaded file is present" # noqa: name[template]
  ansible.builtin.stat:
    path: "{{ artifactory_status_directory }}/{{ archive.filename }}"
  register: downloaded_file
  loop: "{{ archive_definitions }}"
  loop_control:
    loop_var: archive

- name: Set Facts

- name: Delete the downloaded archive if the size is different"  # noqa: name[template]
  ansible.builtin.file:
    path: "{{ artifactory_downloads_directory }}/{{ archive.filename }}"
    state: absent
  when: item[0].stat.exists and item[1].content_length != item[2].stat.size
  with_together:
    - "{{ downloaded_file.results }}"
    - "{{ remote_archive_head.results }}"
    - "{{ downloaded_file.results }}"
  loop: "{{ archive_definitions }}"
  loop_control:
    loop_var: archive
